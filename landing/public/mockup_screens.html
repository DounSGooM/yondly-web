<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, initial-scale=1.0">
    <title>Yondly App Screens</title>
    <style>
        :root {
            --bg: #0f1014;
            --card-bg: #1c1eff;
            /* Slightly lighter than bg */
            --card-surface: #1E2025;
            --primary: #4C7B4B;
            --text: #F3F4F6;
            --text-muted: #9CA3AF;
            --radius: 16px;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .screen-container {
            width: 320px;
            /* Card width */
            position: relative;
        }

        /* Shared Card Styles */
        .card {
            background: var(--card-surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card-image-container {
            height: 180px;
            width: 100%;
            position: relative;
            background: #2d3036;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            backdrop-filter: blur(8px);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .badge.give {
            background: rgba(76, 123, 75, 0.9);
        }

        .badge.sell {
            background: rgba(255, 176, 46, 0.9);
            color: black;
        }

        .badge.rent {
            background: rgba(93, 156, 236, 0.9);
        }

        .card-content {
            padding: 16px;
        }

        .row-between {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .title {
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            margin-bottom: 4px;
        }

        .price {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
        }

        .price.sell {
            color: #FFB02E;
        }

        .price.rent {
            color: #5D9CEC;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #374151;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #D1D5DB;
        }

        .username {
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        .time {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Gamification Widget Specifics */
        .gamification-card {
            background: linear-gradient(135deg, #1f2128 0%, #17181d 100%);
            padding: 24px;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .level-info h3 {
            margin: 0;
            color: var(--text);
            font-size: 20px;
        }

        .level-current {
            color: #AC92EC;
            font-size: 14px;
            margin-top: 4px;
        }

        .progress-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 12px;
            position: relative;
        }

        .progress-bar {
            width: 75%;
            height: 100%;
            background: linear-gradient(90deg, #4C7B4B, #6BCB77);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(107, 203, 119, 0.3);
        }

        .stats-text {
            color: var(--text-muted);
            font-size: 13px;
            text-align: right;
        }

        .stats-highlight {
            color: #6BCB77;
            font-weight: 700;
        }

        /* Button */
        .action-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- 1. GIVE CARD -->
    <div class="screen-container" id="card-give">
        <div class="card">
            <div class="card-image-container">
                <img src="/assets/ui_give.png" class="card-image"
                    style="transform: scale(1.5); object-position: center;" alt="Vegetables">
                <div class="badge give">Don</div>
            </div>
            <div class="card-content">
                <div class="row-between">
                    <div>
                        <h3 class="title">Panier Légumes</h3>
                        <div class="subtitle">📍 200m • Paris 11ème</div>
                    </div>
                    <div class="price">Gratuit</div>
                </div>
                <div class="user-row">
                    <div class="avatar">JM</div>
                    <span class="username">Jean Miche</span>
                    <span class="time">Il y a 2h</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. SELL CARD -->
    <div class="screen-container" id="card-sell">
        <div class="card">
            <div class="card-image-container">
                <img src="/assets/ui_sell.png" class="card-image"
                    style="transform: scale(1.5); object-position: center;" alt="Jacket">
                <div class="badge sell">Vente</div>
            </div>
            <div class="card-content">
                <div class="row-between">
                    <div>
                        <h3 class="title">Veste Vintage</h3>
                        <div class="subtitle">🧥 Mode • Très bon état</div>
                    </div>
                    <div class="price sell">25 €</div>
                </div>
                <div class="user-row">
                    <div class="avatar">SM</div>
                    <span class="username">Sophie M.</span>
                    <span class="time">Il y a 5h</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. RENT CARD -->
    <div class="screen-container" id="card-rent">
        <div class="card">
            <div class="card-image-container">
                <img src="/assets/ui_rent.png" class="card-image"
                    style="transform: scale(1.5); object-position: center;" alt="Drill">
                <div class="badge rent">Location</div>
            </div>
            <div class="card-content">
                <div class="row-between">
                    <div>
                        <h3 class="title">Perceuse Bosch</h3>
                        <div class="subtitle">🛠️ Bricolage • Pro</div>
                    </div>
                    <div class="price rent">5€ /j</div>
                </div>
                <div class="user-row">
                    <div class="avatar">AL</div>
                    <span class="username">Alain L.</span>
                    <span class="time">Il y a 1j</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 4. WIN CARD -->
    <div class="screen-container" id="card-win">
        <div class="card gamification-card">
            <div class="level-header">
                <div class="level-info">
                    <h3>Mon Impact</h3>
                    <div class="level-current">Niveau Actuel : <strong>Expert</strong></div>
                </div>
                <div style="font-size: 32px;">🏆</div>
            </div>

            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>

            <div class="stats-text">
                <span class="stats-highlight">250 kg</span> CO₂ économisés
            </div>

            <button class="action-btn">
                Voir mes récompenses →
            </button>
        </div>
    </div>

</body>

</html>
