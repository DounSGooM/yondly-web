<!-- Safety Logs Page -->
<section id="page-safety-logs" class="page">
    <div class="page-actions">
        <button class="btn-secondary" onclick="loadSafetyLogs()">
            <i class="fas fa-sync"></i> Actualiser
        </button>
    </div>
    <div class="card">
        <div class="card-header">
            <h3>Registre de Sécurité</h3>
            <span class="privacy-badge internal">
                <i class="fas fa-lock"></i> Trust & Safety
            </span>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Gravité</th>
                    <th>Message</th>
                    <th>Métadonnées</th>
                </tr>
            </thead>
            <tbody id="safety-logs-table-body"></tbody>
        </table>
    </div>
</section>
