name: Générer un article de blog Yondly

on:
  schedule:
    # Tous les 2 jours à 8h00 UTC (10h Paris)
    - cron: '0 8 */2 * *'
  workflow_dispatch:
    # Déclenchement manuel depuis l'onglet Actions sur GitHub

jobs:
  generate:
    name: Générer et pousser en brouillon
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic requests

      - name: Générer l'article
        working-directory: website-yondly/backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOG_API_URL:      ${{ secrets.BLOG_API_URL }}
          BLOG_ADMIN_KEY:    ${{ secrets.BLOG_ADMIN_KEY }}
        run: python generate_article.py
