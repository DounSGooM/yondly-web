name: Générer un article de blog Yondly

on:
  schedule:
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  generate:
    name: Générer et pousser en brouillon
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install anthropic pymongo certifi

      - name: Générer l'article
        working-directory: website-yondly/backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MONGO_URL:         ${{ secrets.MONGO_URL }}
          DB_NAME:           ${{ secrets.DB_NAME }}
        run: python generate_article.py
